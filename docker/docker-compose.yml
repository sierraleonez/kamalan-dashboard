version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: kamalan_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../:/var/www/html
    depends_on:
      - php
    networks:
      - kamalan-network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kamalan_php
    volumes:
      - ../:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - mysql
    networks:
      - kamalan-network
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=kamalan
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  mysql:
    image: mysql:8.0
    container_name: kamalan_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: kamalan
      MYSQL_USER: kamalan
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kamalan-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # redis:
  #   image: redis:alpine
  #   container_name: kamalan_redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - kamalan-network
  #   restart: unless-stopped

volumes:
  mysql_data:

networks:
  kamalan-network:
    driver: bridge